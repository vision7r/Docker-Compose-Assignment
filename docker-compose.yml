services:
  backend:
    image: nginx:latest
    ports: 
    - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 6s
      retries: 3
      start_period: 5s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  frontend:
    image: nginx:latest
    ports:
    - "3001:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  database:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rana12345
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U admin -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  
  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli","ping"]
      interval: 5s
      timeout: 4s
      retries: 5
      start_period: 5s
volumes:
  pgdata:

